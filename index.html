<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field-O-Scope — Living Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&family=League+Spartan:wght@500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{
  --kraft:#C4A87C; --kraft-dark:#9C7A4D; --kraft-deep:#6E5631; --cover:#BC9C6E;
  --paper:#FAF8F2; --paper-line:#D9C9A8; --grid:rgba(156,122,77,.13);
  --ink:#1A1A1A; --ink-soft:#46443E; --ink-faint:#9C7A4D;
  --stamp-red:#C2702F; --amber:#D08A3E; --aqua:#7B9BA8; --moss:#8A9A6B; --green:#7F9056;
  --phosphor:#58ffb0; --phosphor-dim:#2fae78; --scope-amber:#ffcc66; --bakelite:#2a2622; --bakelite-hi:#463f37;
  --radius:12px; --shadow-card:0 1px 1px rgba(60,42,18,.10); --mono:'Jost',ui-sans-serif,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--mono);color:var(--ink);line-height:1.5;min-height:100vh;letter-spacing:.01em;
  background:#14151a;
  background-image:radial-gradient(circle at 32% 18%, #21232b, #0e0f13 72%);
  padding:clamp(.6rem,2.5vw,2rem); display:flex; justify-content:center;}
.hub{width:100%; max-width:468px; margin:0 auto;
  --olive:#4d5238;--olive-dk:#393d2a;--olive-hi:#5b6143;
  background:
   radial-gradient(circle at 19px 19px, rgba(0,0,0,.6) 0 2.6px, rgba(255,255,255,.10) 3px 4px, transparent 4.6px),
   radial-gradient(circle at calc(100% - 19px) 19px, rgba(0,0,0,.6) 0 2.6px, rgba(255,255,255,.10) 3px 4px, transparent 4.6px),
   radial-gradient(circle at 19px calc(100% - 19px), rgba(0,0,0,.6) 0 2.6px, rgba(255,255,255,.10) 3px 4px, transparent 4.6px),
   radial-gradient(circle at calc(100% - 19px) calc(100% - 19px), rgba(0,0,0,.6) 0 2.6px, rgba(255,255,255,.10) 3px 4px, transparent 4.6px),
   linear-gradient(157deg, var(--olive-hi), var(--olive) 55%, var(--olive-dk));
  border-radius:16px;
  padding:clamp(1.2rem,3.5vw,2rem);
  box-shadow:0 0 0 3px #e2e5e8, 0 0 0 6px #9aa0a4, 0 0 0 7px #5f6367, 0 22px 52px rgba(0,0,0,.62), inset 0 1px 0 rgba(255,255,255,.08);}.spread{display:flex;flex-direction:column;gap:1rem;}.col-left,.col-right{min-width:0;}.col-right{display:flex;flex-direction:column;gap:1rem;}@media(min-width:900px){.hub{max-width:1140px;}.spread{display:grid;grid-template-columns:440px 1fr;gap:1.8rem;align-items:start;}.col-left{position:relative;}.col-left{position:sticky;top:1.1rem;align-self:start;}.col-right .page{margin-top:0;}.brand h1{font-size:2.8rem;}}
.hidden{display:none!important;}

.hub-header{margin-bottom:1.1rem;}
.dataplate{position:relative;background:linear-gradient(160deg,#3f4430,#2f3324);border:1px solid #20231a;border-radius:5px;
  padding:.7rem 1rem .8rem;box-shadow:inset 0 1px 0 rgba(255,255,255,.10),inset 0 -2px 6px rgba(0,0,0,.45),0 2px 4px rgba(0,0,0,.4);
  background-image:radial-gradient(circle at 9px 9px,rgba(0,0,0,.5) 0 2px,rgba(255,255,255,.08) 2.4px 3.2px,transparent 3.6px),radial-gradient(circle at calc(100% - 9px) 9px,rgba(0,0,0,.5) 0 2px,rgba(255,255,255,.08) 2.4px 3.2px,transparent 3.6px),radial-gradient(circle at 9px calc(100% - 9px),rgba(0,0,0,.5) 0 2px,rgba(255,255,255,.08) 2.4px 3.2px,transparent 3.6px),radial-gradient(circle at calc(100% - 9px) calc(100% - 9px),rgba(0,0,0,.5) 0 2px,rgba(255,255,255,.08) 2.4px 3.2px,transparent 3.6px),linear-gradient(160deg,#3f4430,#2f3324);}
.dp-row{display:flex;justify-content:space-between;align-items:baseline;}
.dp-mfr{font-family:var(--sans);font-size:.52rem;font-weight:700;letter-spacing:.24em;color:var(--scope-amber);opacity:.82;}
.dp-no{font-family:var(--mono);font-size:.5rem;letter-spacing:.08em;color:#b9c0a4;opacity:.7;}
.dataplate h1{font-family:var(--sans);font-size:clamp(1.7rem,6.5vw,2.4rem);font-weight:700;letter-spacing:.04em;color:#eef0e4;line-height:1;margin:.2rem 0 .25rem;text-shadow:0 1px 0 rgba(0,0,0,.5),0 0 1px rgba(255,255,255,.2);}
.dp-sub{font-family:var(--sans);font-size:.5rem;font-weight:600;letter-spacing:.18em;color:#aeb59a;opacity:.75;}
.header-verse{font-size:.7rem;color:#f0e3c6;line-height:1.5;margin-top:.6rem;}
.header-verse .verse-ref{display:block;font-weight:700;letter-spacing:.18em;color:var(--scope-amber);margin-bottom:.2rem;font-size:.6rem;}
.header-verse .vk{color:#fff;font-weight:600;}

/* ===== SCOPE ===== */
.scope-unit{background:linear-gradient(160deg,var(--bakelite-hi),var(--bakelite));border:1px solid #15110d;border-radius:8px;
  padding:.7rem .7rem .6rem;box-shadow:inset 0 2px 8px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.10);}
.scope-stencil-top{font-size:.56rem;font-weight:700;letter-spacing:.22em;color:var(--scope-amber);text-align:center;margin-bottom:.5rem;opacity:.85;text-shadow:0 0 4px rgba(255,204,102,.4);}
.scope-bezel{background:radial-gradient(circle at 50% 40%,#3a342d,#1c1814 80%);border-radius:50%;padding:12px;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.7),inset 0 -1px 0 rgba(255,255,255,.06),0 1px 0 rgba(255,255,255,.05);}
.scope-screen{position:relative;border-radius:50%;overflow:hidden;aspect-ratio:1/1;
  background:radial-gradient(circle at 50% 45%,#0d4030 0%,#07271d 55%,#041610 100%);
  box-shadow:inset 0 0 22px rgba(0,0,0,.85),inset 0 0 60px rgba(40,255,160,.06);}
.scope-screen #wheel{position:relative;display:block;width:100%;height:100%;z-index:2;}
#grid-rings polygon{fill:none;stroke:var(--phosphor-dim);stroke-width:.6;opacity:.45;}
#spokes line{stroke:var(--phosphor-dim);stroke-width:.5;opacity:.4;}
#scope-shape{fill:rgba(88,255,176,.16);stroke:var(--phosphor);stroke-width:2;stroke-linejoin:round;filter:drop-shadow(0 0 3px rgba(88,255,176,.8));transition:all .35s ease;}
#dots circle{fill:var(--phosphor);filter:drop-shadow(0 0 3px rgba(88,255,176,.9));cursor:pointer;transition:r .15s ease;}
#dots circle.active{fill:var(--scope-amber);filter:drop-shadow(0 0 5px rgba(255,204,102,1));}
#labels text{fill:var(--phosphor);font-family:var(--mono);font-weight:600;letter-spacing:.04em;cursor:pointer;opacity:.78;text-shadow:0 0 4px rgba(88,255,176,.7);transition:opacity .15s,fill .15s;}
#labels text.active{fill:var(--scope-amber);opacity:1;}
#scope-sweep{stroke:var(--phosphor);stroke-width:1.2;opacity:.5;transform-box:view-box;transform-origin:160px 160px;animation:sweep 4s linear infinite;filter:drop-shadow(0 0 4px rgba(88,255,176,.8));}
@keyframes sweep{to{transform:rotate(360deg);}}
.scope-scanlines{position:absolute;inset:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply;animation:flicker 3.5s steps(60) infinite;}
@keyframes flicker{0%,100%{opacity:.55;}48%{opacity:.62;}50%{opacity:.48;}}
.scope-glass{position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:50%;
  background:radial-gradient(circle at 32% 26%,rgba(255,255,255,.16),transparent 38%),radial-gradient(circle at 50% 50%,transparent 60%,rgba(0,0,0,.45) 100%);}
.scope-controls{display:flex;align-items:center;justify-content:space-between;margin-top:.55rem;padding:0 .15rem;}
.scope-readout{display:flex;flex-direction:column;line-height:1.05;}
.scope-readout-lbl{font-size:.5rem;font-weight:700;letter-spacing:.16em;color:var(--scope-amber);opacity:.8;}
.scope-readout-val{font-size:1.35rem;font-weight:700;color:var(--phosphor);text-shadow:0 0 6px rgba(88,255,176,.7);font-variant-numeric:tabular-nums;}
.scope-dials{display:flex;align-items:center;gap:8px;}
.scope-knob{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#5a5149,#211d19);box-shadow:inset 0 1px 1px rgba(255,255,255,.18),0 1px 2px rgba(0,0,0,.6);border:1px solid #15110d;}
.scope-knob::after{content:"";display:block;width:2px;height:7px;margin:1px auto;background:var(--scope-amber);opacity:.6;border-radius:1px;}
.scope-lamp{width:9px;height:9px;border-radius:50%;background:var(--phosphor);box-shadow:0 0 7px var(--phosphor);animation:flicker 2.2s ease-in-out infinite;}

/* ===== TOC ===== */
.page{background:var(--paper);border:1px solid #2c2f22;border-radius:var(--radius);box-shadow:inset 0 2px 5px rgba(0,0,0,.30),0 1px 0 rgba(255,255,255,.18);padding:1.05rem 1.1rem 1.25rem;margin-top:1.1rem;text-align:left;}.page.idxpage{background:linear-gradient(160deg,var(--bakelite-hi),var(--bakelite));border:1px solid #15110d;box-shadow:inset 0 2px 10px rgba(0,0,0,.7),0 1px 0 rgba(255,255,255,.08);}.idx-stencil{font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.22em;color:var(--scope-amber);text-align:center;margin-bottom:.75rem;opacity:.88;text-shadow:0 0 4px rgba(255,204,102,.4);}.sidecard{margin-top:.85rem;background:var(--paper);border:1px solid var(--kraft-dark);border-radius:6px;padding:.65rem .8rem;box-shadow:0 6px 15px rgba(38,25,9,.30),inset 0 1px 0 rgba(255,255,255,.55);}.dispatch{margin-top:.95rem;background:#fbf6e9;border:1px solid #2c2f22;border-radius:3px;padding:.7rem .9rem .85rem;box-shadow:inset 0 2px 5px rgba(0,0,0,.28),0 1px 0 rgba(255,255,255,.18);background-image:repeating-linear-gradient(90deg,transparent 0 6px,rgba(110,80,40,.015) 6px 7px);}.dispatch .dh{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed var(--paper-line);padding-bottom:.38rem;margin-bottom:.5rem;}.dispatch .dt{font-family:var(--sans);font-size:.6rem;font-weight:700;letter-spacing:.2em;color:var(--kraft-deep);}.dispatch .dw{font-family:"Special Elite",monospace;font-size:.6rem;color:var(--ink-faint);}.dispatch .re{font-family:'Special Elite',monospace;font-size:.62rem;color:var(--ink-faint);margin-bottom:.4rem;}.dispatch .vt{font-family:'Special Elite',monospace;font-size:.85rem;line-height:1.6;color:var(--ink);}.dispatch .vr{display:block;font-family:'Special Elite',monospace;font-size:.64rem;color:var(--ink-soft);margin-top:.45rem;text-align:right;letter-spacing:.04em;}.legend{display:flex;flex-wrap:wrap;align-items:center;gap:.65rem;font-family:var(--mono);font-size:.6rem;font-weight:700;letter-spacing:.05em;color:var(--ink-soft);}.legend .sk{color:var(--kraft-deep);letter-spacing:.16em;}.legend .lg{display:flex;align-items:center;gap:.3rem;}.legend i{width:12px;height:6px;border-radius:1px;display:inline-block;border:1px solid rgba(0,0,0,.15);}
h2.sec{font-size:.8rem;font-weight:800;letter-spacing:.18em;color:var(--kraft-deep);margin:.1rem 0 .7rem;text-align:left;}
.toc-list{display:flex;flex-direction:column;gap:.55rem;padding-top:.3rem;}.tab-row{display:flex;gap:.5rem;}.tab-row.off{margin-left:1.9rem;}.toc-item{position:relative;flex:1 1 0;min-width:0;text-align:left;cursor:pointer;font-family:var(--mono);background:#fbf4e2;border:1px solid var(--kraft-dark);border-top:3px solid var(--kraft);border-radius:7px 7px 2px 2px;padding:.42rem .55rem .5rem;box-shadow:0 1px 0 rgba(0,0,0,.10),inset 0 1px 0 rgba(255,255,255,.55);transition:transform .1s,background .12s,box-shadow .12s;}.toc-item:hover{background:#fff;transform:translateY(-2px);}.toc-item.active{background:#fffdf6;transform:translateY(-3px);box-shadow:0 5px 11px rgba(60,42,18,.24);}.toc-item .tn{font-size:.52rem;font-weight:800;letter-spacing:.06em;color:var(--kraft-deep);}.toc-item.active .tn{color:var(--stamp-red);}.toc-item .tt{display:block;font-family:'League Spartan','Jost',sans-serif;font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.045em;color:var(--ink);line-height:1.05;margin-top:.1rem;}.toc-item.inbox{background:#e7d9bb;border-style:dashed;border-top-color:var(--kraft-deep);}

/* ===== PANELS (graph paper ledger) ===== */
.ledger-rule{display:flex;justify-content:space-between;align-items:baseline;font-size:.62rem;font-weight:700;letter-spacing:.2em;color:var(--kraft-deep);border-bottom:2px solid var(--kraft-dark);padding-bottom:.4rem;margin:1.4rem 0 .8rem;} .ledger-rule:first-child{margin-top:0;}
.panel{display:none;background:#fffdf6;border:1px solid var(--paper-line);border-radius:6px;padding:1.1rem 1.15rem 1.3rem;}.recordpage{margin-top:1rem;}.rec-cols{display:flex;flex-direction:column;}.rc{min-width:0;}@media(min-width:900px){.rec-cols{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem;align-items:start;}.p-head{margin-bottom:.2rem;}}
.panel.show{display:block;}
.p-head{display:flex;align-items:center;gap:.7rem;border-bottom:1px dashed var(--paper-line);padding-bottom:.7rem;}
.spoke-stamp{font-size:.78rem;font-weight:800;color:#fff;background:var(--stamp-red);padding:.25rem .5rem;border-radius:2px;}
.p-head h3{font-size:1rem;font-weight:700;letter-spacing:.04em;}.horizon{font-size:.72rem;font-style:italic;color:var(--ink-soft);margin-top:.15rem;}.horizon .hz{font-style:normal;font-size:.5rem;font-weight:700;letter-spacing:.14em;color:var(--amber);background:#f6ecd6;padding:.05rem .3rem;border-radius:2px;margin-right:.35rem;vertical-align:middle;}.mini-sig{display:flex;flex-direction:column;align-items:center;flex:none;}.gsvg{width:46px;height:28px;display:block;}.mini-val{font-size:.7rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;margin-top:-2px;}
.p-head p{font-size:.72rem;color:var(--ink-faint);}
.lblrow{display:flex;align-items:center;gap:.45rem;font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--kraft-deep);margin:1rem 0 .4rem;}.lblrow .hint{font-weight:500;letter-spacing:.03em;text-transform:none;color:var(--ink-faint);font-size:.52rem;margin-left:.1rem;}.focuscard{display:flex;align-items:flex-start;gap:.5rem;border-left:3px solid var(--amber);}.focus-text{flex:1;font-size:.84rem;color:var(--ink);outline:none;border-radius:2px;padding:.05rem .15rem;}.focus-text:focus{background:#fff7e6;box-shadow:0 0 0 1px var(--amber);}.fpen{font-size:.7rem;color:var(--amber);opacity:.6;flex:none;}
.asana-badge{font-size:.5rem;background:var(--amber);color:#fff;padding:.1rem .35rem;border-radius:2px;letter-spacing:.1em;}
.card{background:#fffdf6;border:1px solid var(--paper-line);border-radius:3px;padding:.6rem .75rem;box-shadow:var(--shadow-card);}
.sigrow{display:flex;align-items:center;justify-content:space-between;}
.sigbars{letter-spacing:-1px;font-weight:700;}
.touched{font-size:.66rem;font-weight:700;letter-spacing:.08em;}
.ta{width:100%;resize:none;border:1px solid var(--paper-line);border-radius:3px;background:#fff;font-family:var(--mono);font-size:.82rem;color:var(--ink);padding:.5rem .6rem;min-height:54px;margin-top:.3rem;}
.btnrow{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.btn{font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.08em;border-radius:3px;padding:.45rem .7rem;cursor:pointer;border:1px solid var(--kraft-dark);background:transparent;color:var(--ink-soft);}
.btn.dark{background:var(--ink);color:var(--paper);border:none;}
.btn.stamp{background:var(--stamp-red);color:#fff;border:none;}

/* inbox subsections */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.4rem;}
.tile{border:1px solid var(--paper-line);border-radius:3px;padding:.5rem .6rem;background:#fffdf6;}
.tile .s{font-size:.58rem;font-weight:700;letter-spacing:.1em;color:var(--ink-faint);}
.tile .v{font-size:1.05rem;font-weight:700;margin-top:.15rem;}
.tile .v.hot{color:var(--stamp-red);}
.tile small{display:block;font-size:.54rem;color:var(--ink-faint);letter-spacing:.04em;font-weight:500;}
.commit{padding:.6rem .1rem;border-bottom:1px solid var(--paper-line);}
.commit .q{font-size:.84rem;}
.commit .src{font-size:.58rem;color:var(--ink-faint);letter-spacing:.06em;margin-top:.1rem;}
.chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.45rem;}
.chips button{font-family:var(--mono);font-size:.58rem;font-weight:700;letter-spacing:.04em;border:1px solid var(--kraft-dark);background:transparent;color:var(--ink-soft);border-radius:3px;padding:.3rem .55rem;cursor:pointer;}
.chips button.mine{border-color:var(--stamp-red);color:var(--stamp-red);}
.commit.done{opacity:.5;}.commit.done .chips{display:none;}
.filed{display:none;font-size:.6rem;font-weight:700;color:var(--green);margin-top:.4rem;letter-spacing:.06em;}
.commit.done .filed{display:block;}
.anchor{margin-top:1.1rem;background:#efe6cf;border:1px solid var(--paper-line);border-radius:3px;padding:.7rem .85rem;transform:rotate(.3deg);}
.anchor .al{font-size:.54rem;font-weight:700;letter-spacing:.18em;color:var(--kraft-deep);}
.anchor blockquote{font-size:.82rem;font-style:italic;color:var(--ink-soft);margin-top:.3rem;}
:focus-visible{outline:2px solid var(--stamp-red);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){#scope-sweep{animation:none;}.scope-lamp,.scope-scanlines{animation:none;}}

/* ===== SHEPHERDING · PRAYER ROOM (scoped) ===== */
.prroom{margin-top:.3rem;}
.prroom .so{background:#fbf6e9;border:1px solid #2c2f22;border-left:3px solid var(--moss);border-radius:3px;padding:.5rem .7rem;margin:.2rem 0 .9rem;font-family:'Special Elite',monospace;font-size:.72rem;line-height:1.55;color:var(--ink-soft);box-shadow:inset 0 1px 0 rgba(255,255,255,.4);}
.prroom .so .r{display:block;margin-top:.3rem;font-family:'League Spartan',sans-serif;font-size:.56rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);}
.prroom .ptabs{display:flex;gap:.5rem;margin-bottom:.7rem;}
.prroom .ptab{flex:1;cursor:pointer;font-family:'League Spartan',sans-serif;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:.42rem .5rem;border:1px solid var(--kraft-dark);border-top:3px solid var(--kraft);border-radius:6px 6px 2px 2px;background:#fbf4e2;color:var(--ink-faint);box-shadow:inset 0 -6px 8px -6px rgba(0,0,0,.18);}
.prroom .ptab .ct{display:block;font-size:.52rem;font-weight:400;letter-spacing:.04em;color:var(--ink-faint);margin-bottom:.05rem;}
.prroom .ptab.on{background:#fffdf6;color:var(--ink);transform:translateY(-2px);box-shadow:0 4px 9px rgba(60,42,18,.2);}
.prroom .ptab.on .ct{color:var(--stamp-red);}
.prroom .stage{position:relative;}
.prroom .draw{position:absolute;left:5px;right:5px;top:7px;bottom:-5px;border-radius:7px;background:#f3ead2;border:1px solid var(--kraft-dark);z-index:0;}
.prroom .draw.two{left:9px;right:9px;top:12px;opacity:.6;}
.prroom .pcard{position:relative;z-index:2;background:var(--paper);border:1px solid var(--kraft-dark);border-top:3px solid var(--band,var(--moss));border-radius:7px;box-shadow:0 6px 15px rgba(38,25,9,.30),inset 0 1px 0 rgba(255,255,255,.55);padding:.85rem .95rem .95rem;overflow:hidden;transition:transform .42s cubic-bezier(.2,.7,.3,1),opacity .42s;}
.prroom .pcard.leaving{transform:translateY(-24px) rotate(1.5deg);opacity:0;}
.prroom .pcard.entering{transform:translateY(20px);opacity:0;}
.prroom .lens{font-family:'League Spartan',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}
.prroom .who{font-size:1.4rem;font-weight:700;line-height:1.14;margin:.16rem 0 .04rem;color:var(--ink);}
.prroom .who .ar{color:var(--kraft-deep);font-weight:400;padding:0 .16em;}
.prroom .sub{font-style:italic;font-size:.9rem;color:var(--ink-soft);}
.prroom .meta{display:flex;flex-wrap:wrap;gap:.35rem .45rem;margin-top:.7rem;}
.prroom .chip{font-size:.62rem;font-weight:600;color:var(--ink-soft);background:#f4ead4;border:1px solid var(--kraft-dark);border-radius:20px;padding:.16rem .55rem;}
.prroom .chip.rcp{color:#566b3a;border-color:#bcc69e;background:#eef1e3;}
.prroom .chip.wait{color:var(--ink-faint);background:transparent;}
.prroom .chip.live{color:#3c6b3a;border-color:#b6c79a;background:#eaf0df;font-weight:700;}
.prroom .chip.sample{color:var(--ink-faint);border-style:dashed;background:transparent;}
.prroom .log{margin-top:.7rem;font-family:'Special Elite',monospace;font-size:.72rem;line-height:1.55;color:var(--ink-soft);background:#fbf6e9;border:1px dashed var(--kraft-dark);border-radius:3px;padding:.45rem .6rem;}
.prroom .log b{display:block;font-family:'League Spartan',sans-serif;font-size:.56rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:.2rem;}
.prroom .step{margin-top:.55rem;font-size:.94rem;color:var(--ink);display:flex;gap:.45rem;align-items:flex-start;}

function prRender(anim){

  var nx=q[1];
  document.getElementById('pr-next').textContent=nx?(prLens==='flock'?nx.who:nx.disciple):"\u2014";
  document.getElementById('pr-count').textContent=q.length+' in rotation';

function prPrayed(){
  if(prBusy)return; var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var it=prQueue()[0]; it.wk=0; it.prayed=true;
  var arr=PR[prLens], ix=arr.indexOf(it); if(ix>-1){ arr.splice(ix,1); arr.push(it); } // to the back of the line
  var card=document.getElementById('pr-card');
  if(reduce){prRender(false);return;}
  prBusy=true; card.classList.add('praying');
  setTimeout(function(){card.classList.add('leaving');setTimeout(function(){card.classList.remove('praying','leaving');prRender(true);prBusy=false;},420);},360);
}
